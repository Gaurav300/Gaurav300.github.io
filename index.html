<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: #333;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 350px;
      text-align: center;
      z-index: 2;
    }

    h1 {
      color: #ff4d6d;
      font-size: 24px;
    }

    p {
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .hidden {
      display: none;
      margin-top: 20px;
      font-size: 18px;
      line-height: 1.5;
    }

    .heart {
      position: absolute;
      color: red;
      animation: float 5s linear infinite;
      font-size: 20px;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Happy Birthday Pooja ❤️</h1>
    <p>You make my world more beautiful every day 🌸</p>

    <button onclick="startSurprise()">Tap for Surprise 🎁</button>

    <div id="message" class="hidden">
      💖 You are the most special person in my life 💖<br>
      💍 I feel lucky to have you as my partner 💍<br><br>
      🌟 I promise to always support, respect and love you 🌟<br><br>
      🎉 Happy Birthday once again, my future wife 🎉
    </div>
  </div>
  <script>
    function startSurprise() {
      document.getElementById('message').style.display = 'block';
      document.getElementById('music').play();
      createHearts();
    }

    function createHearts() {
      setInterval(() => {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 20 + 10 + 'px';
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 5000);
      }, 300);
    }
  </script>

</body>
</html>
